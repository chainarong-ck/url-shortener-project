# Support WebSocket and HTTP upgrade requests when proxying to app containers.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Upstream target for the Next.js frontend.
upstream url_shortener_web {
    server web:3000;
    keepalive 32;
}

# Upstream target for the API service.
upstream url_shortener_api {
    server api:3000;
    keepalive 32;
}

# Upstream target for the short-link redirector service.
upstream url_shortener_redirector {
    server redirector:3000;
    keepalive 32;
}

# Redirect every plain HTTP request to HTTPS before routing by hostname.
server {
    listen 80;
    listen [::]:80;
    server_name example.com app.example.com api.example.com;

    return 301 https://$host$request_uri;
}

# Frontend domain: proxy all requests to the web container.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.example.com;

    ssl_certificate /etc/ssl/cloudflare/origin.crt;
    ssl_certificate_key /etc/ssl/cloudflare/origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    client_max_body_size 10m;

    location / {
        # Pass all frontend traffic to the Next.js app.
        proxy_pass http://url_shortener_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}

# API domain: proxy all requests to the backend API container.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.example.com;

    ssl_certificate /etc/ssl/cloudflare/origin.crt;
    ssl_certificate_key /etc/ssl/cloudflare/origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    client_max_body_size 10m;

    location / {
        # Pass all API traffic to the NestJS API app.
        proxy_pass http://url_shortener_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}

# Root domain: homepage goes to the frontend, short-code paths go to the redirector.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name example.com;

    ssl_certificate /etc/ssl/cloudflare/origin.crt;
    ssl_certificate_key /etc/ssl/cloudflare/origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    client_max_body_size 10m;

    location = / {
        # Send the bare domain homepage to the frontend site.
        return 302 https://app.example.com;
    }

    location / {
        # Keep other paths on the redirector so short links still resolve on the root domain.
        proxy_pass http://url_shortener_redirector;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
