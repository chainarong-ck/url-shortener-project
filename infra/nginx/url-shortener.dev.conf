# Support WebSocket and HTTP upgrade requests when proxying to app containers.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Upstream target for the Next.js frontend.
upstream url_shortener_web {
    server web:3000;
    keepalive 32;
}

# Upstream target for the API service.
upstream url_shortener_api {
    server api:3000;
    keepalive 32;
}

# Upstream target for the short-link redirector service.
upstream url_shortener_redirector {
    server redirector:3000;
    keepalive 32;
}

# Frontend domain: proxy all requests to the web container.
server {
    listen 80;
    listen [::]:80;
    server_name app.localhost;

    client_max_body_size 10m;

    location / {
        # Pass all frontend traffic to the Next.js app.
        proxy_pass http://url_shortener_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}

# API domain: proxy all requests to the backend API container.
server {
    listen 80;
    listen [::]:80;
    server_name api.localhost;

    client_max_body_size 10m;

    location / {
        # Pass all API traffic to the NestJS API app.
        proxy_pass http://url_shortener_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}

# Root domain: homepage goes to the frontend, short-code paths go to the redirector.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name localhost 127.0.0.1;

    client_max_body_size 10m;

    location = / {
        # Send the bare domain homepage to the frontend site.
        return 302 http://app.localhost;
    }

    location / {
        # Keep other paths on the redirector so short links still resolve on the root domain.
        proxy_pass http://url_shortener_redirector;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
